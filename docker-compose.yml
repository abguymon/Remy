# Remy v2 — two deployable services only (PRD §4, §8).
# Kroger and recipe functionality are internal modules of remy-api, not
# separate containers. No Mealie, no MCP sidecars.

networks:
  # Reverse-proxy network (Traefik). Create once: docker network create t2_proxy
  t2_proxy:
    external: true
  # Internal service network. Create once: docker network create remy-net
  remy-net:
    external: true

services:
  remy-api:
    build: ./services/remy-api
    container_name: remy-api
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///data/remy.db
      # Seed sources for new users' default settings (PRD §6, FR-23/FR-24).
      PANTRY_FILE: /app/seed/pantry.yaml
      RECIPE_SOURCES_FILE: /app/seed/recipe_sources.yaml
    # No host port: remy-web's nginx proxies /api/* internally and Traefik
    # handles ingress (host 8080 belongs to Traefik). For direct-API dev use
    # uvicorn (see README).
    volumes:
      # Shared data volume: SQLite DB + recipe images
      - ./data:/app/data
      # Seed defaults (read-only) — single source of truth at repo root
      - ./pantry.yaml:/app/seed/pantry.yaml:ro
      - ./recipe_sources.yaml:/app/seed/recipe_sources.yaml:ro
    networks:
      - remy-net
    depends_on:
      - searxng

  # Self-hosted metasearch engine — the default SEARCH_PROVIDER=searxng backend.
  # Internal only: no host ports, no reverse proxy, remy-net exclusively. Queried
  # by remy-api at http://searxng:8080 (SEARXNG_URL). See searxng/settings.yml
  # (JSON format enabled, bot limiter disabled for the internal API client).
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: always
    environment:
      # Injected into settings.yml's secret_key. Generate once, keep in .env.
      SEARXNG_SECRET: ${SEARXNG_SECRET:-}
    volumes:
      - ./searxng:/etc/searxng
    networks:
      - remy-net

  remy-web:
    build:
      context: ./services/remy-web
      args:
        VITE_API_URL: /api
    container_name: remy-web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - remy-api
    networks:
      - t2_proxy
      - remy-net
    labels:
      - "traefik.enable=true"
      ## Router
      - "traefik.http.routers.remy-rtr.entrypoints=https"
      - "traefik.http.routers.remy-rtr.rule=Host(`remy.$DOMAINNAME`)"
      - "traefik.http.routers.remy-rtr.tls=true"
      ## Middleware - no auth (app handles its own)
      - "traefik.http.routers.remy-rtr.middlewares=chain-no-auth@file"
      ## Service
      - "traefik.http.routers.remy-rtr.service=remy-svc"
      - "traefik.http.services.remy-svc.loadbalancer.server.port=80"
