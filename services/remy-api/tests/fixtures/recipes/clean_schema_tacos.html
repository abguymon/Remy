<!DOCTYPE html>
<html>
<head>
  <title>Weeknight Street Tacos</title>
  <meta property="og:image" content="https://example.com/img/street-tacos.jpg" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Recipe",
    "name": "Weeknight Street Tacos",
    "image": ["https://example.com/img/street-tacos.jpg"],
    "recipeYield": "4 servings",
    "prepTime": "PT15M",
    "cookTime": "PT20M",
    "totalTime": "PT35M",
    "recipeIngredient": [
      "1 lb flank steak, thinly sliced",
      "2 tablespoons olive oil",
      "1 teaspoon ground cumin",
      "8 small corn tortillas",
      "1/2 cup chopped fresh cilantro",
      "1 lime, cut into wedges"
    ],
    "recipeInstructions": [
      {"@type": "HowToStep", "text": "Toss the steak with oil and cumin."},
      {"@type": "HowToStep", "text": "Sear the steak over high heat until browned."},
      {"@type": "HowToStep", "text": "Warm the tortillas in a dry skillet."},
      {"@type": "HowToStep", "text": "Fill tortillas with steak, top with cilantro, serve with lime."}
    ]
  }
  </script>
</head>
<body><h1>Weeknight Street Tacos</h1></body>
</html>
