/cookieandkate.com\/images\/2024\/10\/logo-696.png","width":696,"height":696,"caption":"Cookie and Kate"},"image":{"@id":"https:\/\/cookieandkate.com\/#\/schema\/logo\/image\/"},"sameAs":["https:\/\/www.facebook.com\/cookieandkate","https:\/\/x.com\/cookieandkate","https:\/\/instagram.com\/cookieandkate","https:\/\/www.linkedin.com\/in\/kathryne-taylor-20012213\/","https:\/\/www.pinterest.com\/cookieandkate\/","https:\/\/www.youtube.com\/user\/cookieandkate\/"]},{"@type":"Person","@id":"https:\/\/cookieandkate.com\/#\/schema\/person\/c609c24a34a1976d0a3c1a1b0cd7f46a","name":"Kathryne Taylor","image":{"@type":"ImageObject","inLanguage":"en-US","@id":"https:\/\/cookieandkate.com\/images\/2024\/10\/cropped-kathryne-taylor-200-96x96.jpg","url":"https:\/\/cookieandkate.com\/images\/2024\/10\/cropped-kathryne-taylor-200-96x96.jpg","contentUrl":"https:\/\/cookieandkate.com\/images\/2024\/10\/cropped-kathryne-taylor-200-96x96.jpg","caption":"Kathryne Taylor"},"description":"I'm a vegetable enthusiast, dog lover, mother and bestselling cookbook author. I've been sharing recipes here on Cookie and Kate since 2010, and I'm always cooking something new in my Kansas City kitchen. Cook with me!","sameAs":["https:\/\/cookieandkate.com\/about\/"]},{"@context":"https:\/\/schema.org\/","@type":"Recipe","name":"Best Hummus","description":"Learn how to make the best homemade hummus! It's creamy, dreamy and light. This hummus recipe is easy to make—no peeling chickpeas or overnight soak required. Recipe yields about 2 cups.","author":{"@type":"Person","name":"Cookie and Kate","url":"https:\/\/cookieandkate.com\/about\/"},"keywords":"hummus, chickpeas, easy","image":["https:\/\/cookieandkate.com\/images\/2018\/05\/best-hummus-225x225.jpg","https:\/\/cookieandkate.com\/images\/2018\/05\/best-hummus-260x195.jpg","https:\/\/cookieandkate.com\/images\/2018\/05\/best-hummus-320x180.jpg","https:\/\/cookieandkate.com\/images\/2018\/05\/best-hummus.jpg"],"url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/","recipeIngredient":["1 can (15 ounces) chickpeas, rinsed and drained, or 1 &frac12; cups cooked chickpeas","&frac12; teaspoon baking soda (if you&#8217;re using canned chickpeas)","¼ cup lemon juice (from 1 ½ to 2 lemons), more to taste","1 medium-to-large clove garlic, roughly chopped","&frac12; teaspoon fine sea salt, to taste","&frac12; cup tahini","2 to 4 tablespoons ice water, more as needed","&frac12; teaspoon ground cumin","1 tablespoon extra-virgin olive oil","Any of the following garnishes:  drizzle of olive oil or zhoug sauce, sprinkle of ground sumac or paprika, chopped fresh parsley"],"recipeInstructions":[{"@type":"HowToStep","text":"Place the chickpeas in a medium saucepan and add the baking soda. Cover the chickpeas by several inches of water, then bring the mixture to a boil over high heat. Continue boiling, reducing heat if necessary to prevent overflow, for about 20 minutes, or until the chickpeas look bloated, their skins are falling off, and they&#8217;re quite soft. In a fine-mesh strainer, drain the chickpeas and run cool water over them for about 30 seconds. Set aside (no need to peel the chickpeas for this recipe!).","url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#instruction-step-1"},{"@type":"HowToStep","text":"Meanwhile, in a food processor or high-powered blender, combine the lemon juice, garlic and salt. Process until the garlic is very finely chopped, then let the mixture rest so the garlic flavor can mellow, ideally 10 minutes or longer.","url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#instruction-step-2"},{"@type":"HowToStep","text":"Add the tahini to the food processor and blend until the mixture is thick and creamy, stopping to scrape down any tahini stuck to the sides and bottom of the processor as necessary.","url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#instruction-step-3"},{"@type":"HowToStep","text":"While running the food processor, drizzle in 2 tablespoons ice water. Scrape down the food processor, and blend until the mixture is ultra smooth, pale and creamy. (If your tahini was extra-thick to begin with, you might need to add 1 to 2 tablespoons more ice water.)","url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#instruction-step-4"},{"@type":"HowToStep","text":"Add the cumin and the drained, over-cooked chickpeas to the food processor. While blending, drizzle in the olive oil. Blend until the mixture is super smooth, scraping down the sides of the processor as necessary, about 2 minutes. Add more ice water by the tablespoon if necessary to achieve a super creamy texture.","url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#instruction-step-5"},{"@type":"HowToStep","text":"Taste, and adjust as necessary—I almost always add another &frac14; teaspoon salt for more overall flavor and another tablespoon of lemon juice for extra zing.","url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#instruction-step-6"},{"@type":"HowToStep","text":"Scrape the hummus into a serving bowl or platter, and use a spoon to create nice swooshes on top. Top with garnishes of your choice, and serve. Leftover hummus keeps well in the refrigerator, covered, for up to 1 week.","url":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#instruction-step-7"}],"prepTime":"PT20M","cookTime":"PT20M","totalTime":"PT40M","recipeYield":["2","2 cups (8 servings)"],"recipeCategory":"Dip","cookingMethod":"Food processor","recipeCuisine":"Israeli","aggregateRating":{"@type":"AggregateRating","reviewCount":"2409","ratingValue":"4.9"},"nutrition":{"servingSize":"1\/4 cup","calories":"151 calories","sugarContent":"1.5 g","sodiumContent":"217.4 mg","fatContent":"10.6 g","saturatedFatContent":"1.5 g","transFatContent":"0 g","carbohydrateContent":"11.1 g","fiberContent":"3.4 g","proteinContent":"4.9 g","cholesterolContent":"0 mg","@type":"nutritionInformation"},"video":{"@context":"http:\/\/schema.org","@type":"VideoObject","name":"”Classic","description":"”Watch","contentUrl":"https:\/\/content.jwplatform.com\/videos\/&rdquo;GQVkbhi6&Prime;.mp4","thumbnailUrl":["https:\/\/content.jwplatform.com\/thumbs\/&rdquo;GQVkbhi6&Prime;-720.jpg"],"uploadDate":"1970-01-01T00:00:00+00:00"},"review":[{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"Lisa"},"datePublished":"2026-05-18","reviewBody":"Oh my! It turned out just beautiful!! Thank you for the details you provide, Kate. I discovered that I did not have canned beans in the house so I made this from dried and it took longer but your notes were spot on. \r\nWe added some fresh dill and extra lemon to ours and it was just what we were hoping for!"},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"4"},"author":{"@type":"Person","name":"Lou"},"datePublished":"2026-05-20","reviewBody":"I followed the recipe using ice cubes and after blending it all at the end it's incredibly thin and runny. Not sure what I did wrong... Taste is good as a sauce but not the consistency of a dip."},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"Gem Jackman"},"datePublished":"2026-05-25","reviewBody":"I have just completed making your hummus recipe, and it is smooth velvet heaven!!\r\nIt is so delicious and I highly recommend this hummus!!\r\nNothing compared to any other!! Thank-you so much!!"},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"Shay"},"datePublished":"2026-05-26","reviewBody":"Unbelievable!!! I followed your recipe exactly and it turned out amazing!!! This is the best hummus I've ever tasted!!"},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"Janice Smith"},"datePublished":"2026-06-13","reviewBody":"This is the only recipe I use for hummus!  What I have noticed in last few batches is that when I add even one Tbs of ice water, it's very runny.\r\nMaybe Trader Joe's R had (I have had many versions). The only hummus I had that was equal was when a Jordanian made it for me."},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"Leanna"},"datePublished":"2026-06-20","reviewBody":"I followed your instructions exactly, and it turned out AMAZING!  I also made your falafel recipe for the same meal--equally wonderful.  Thank you for your great, clear instructions.  We'll be making it again soon!"},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"diana"},"datePublished":"2026-06-24","reviewBody":"EXCELLENT! This recipe is so creamy and tasty.  We make this hummus recipe quite often!"},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"Abbe Stashower"},"datePublished":"2026-06-27","reviewBody":"SO GOOD! Very smooth and full of flavor hummus! I doubled the recipe, using canned 365 Organic garbanzo beans. I added a bit more lemon juice (as Kate suggested) and about 5 garlic cloves. It makes a lot and I will share it with my neighbors. I am wondering if I can freeze it…"},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"5"},"author":{"@type":"Person","name":"Liz"},"datePublished":"2026-06-29","reviewBody":"Why, oh why, oh why, didn't I just click on your website for this recipe first?\r\n\r\nAfter hours of doing what I think you did, you have streamlined all the best bits and tips from many recipe sites and just made it as simple as can be for those of us who just want to use a tin of chickpeas, without having to peel, or make our own tahini, or go out and purchase a Vitamix and end up with something truly delicious.\r\n\r\nI have NEVER been anything other than delighted by any of your recipes!"},{"@type":"Review","reviewRating":{"@type":"Rating","ratingValue":"3"},"author":{"@type":"Person","name":"Chris"},"datePublished":"2026-07-04","reviewBody":"Not a fan of this recipe. Too much Tahini"}],"datePublished":"2018-05-23","@id":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#recipe","isPartOf":{"@id":"https:\/\/cookieandkate.com\/best-hummus-recipe\/#article"},"mainEntityOfPage":"https:\/\/cookieandkate.com\/best-hummus-recipe\/"}]}</script>
