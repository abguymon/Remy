  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ize:12px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;color:#6B6156;\">Desktop<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- jump / state controls -->\n  <div style=\"width:100%;max-width:1120px;display:flex;flex-wrap:wrap;gap:6px;font-family:ui-monospace,Menlo,monospace;font-size:11px;\">\n    <span style=\"color:#A79B8B;align-self:center;margin-right:4px;\">jump:<\u002Fspan>\n    <button onclick=\"{{ jump }}\" data-s=\"login\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">login<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"plan\" data-step=\"0\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">plan·input<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"plan\" data-step=\"1\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">plan·pick<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"plan\" data-step=\"2\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">plan·list<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"plan\" data-step=\"3\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">plan·cart<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"plan\" data-step=\"4\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">plan·done<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"cookbook\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">cookbook<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"recipe\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">recipe<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"record\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">cart record<\u002Fbutton>\n    <button onclick=\"{{ jump }}\" data-s=\"settings\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:4px 9px;cursor:pointer;font:inherit;color:#6B6156;\">settings<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- device frame -->\n  <div style=\"{{ frameStyle }}\">\n    <div style=\"{{ screenStyle }}\">\n\n      <!-- desktop sidebar -->\n      <sc-if value=\"{{ isDesktop }}\">\n        <sc-if value=\"{{ showChrome }}\">\n        <div style=\"width:230px;flex:0 0 auto;background:#FFFDFA;border-right:1px solid #E7DFD3;display:flex;flex-direction:column;padding:22px 16px;gap:6px;\">\n          <div class=\"ns\" style=\"font-size:24px;font-weight:600;letter-spacing:-.01em;padding:0 8px 18px;\">Remy<\u002Fdiv>\n          <button onclick=\"{{ tabTo }}\" data-t=\"plan\" style=\"text-align:left;border:none;background:transparent;font:inherit;font-size:14px;font-weight:600;padding:11px 12px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:10px;color:#2A2520;\">Plan<\u002Fbutton>\n          <button onclick=\"{{ tabTo }}\" data-t=\"cookbook\" style=\"text-align:left;border:none;background:transparent;font:inherit;font-size:14px;font-weight:600;padding:11px 12px;border-radius:9px;cursor:pointer;color:#6B6156;\">Cookbook<\u002Fbutton>\n          <button onclick=\"{{ tabTo }}\" data-t=\"cart\" style=\"text-align:left;border:none;background:transparent;font:inherit;font-size:14px;font-weight:600;padding:11px 12px;border-radius:9px;cursor:pointer;color:#6B6156;\">Cart<\u002Fbutton>\n          <button onclick=\"{{ tabTo }}\" data-t=\"settings\" style=\"text-align:left;border:none;background:transparent;font:inherit;font-size:14px;font-weight:600;padding:11px 12px;border-radius:9px;cursor:pointer;color:#6B6156;\">Settings<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <!-- content column -->\n      <div style=\"flex:1;min-width:0;display:flex;flex-direction:column;position:relative;\">\n\n        <!-- phone status bar -->\n        <sc-if value=\"{{ isPhone }}\">\n          <div style=\"flex:0 0 auto;height:46px;display:flex;align-items:flex-end;justify-content:space-between;padding:0 26px 6px;font-size:14px;font-weight:600;color:#2A2520;\">\n            <span class=\"tab-fig\">9:41<\u002Fspan>\n            <div style=\"width:120px;height:26px;background:#17130F;border-radius:0 0 18px 18px;margin-top:-8px;\"><\u002Fdiv>\n            <span style=\"display:flex;gap:5px;align-items:center;\"><span style=\"font-size:12px;\">5G<\u002Fspan><span style=\"width:22px;height:11px;border:1.5px solid #2A2520;border-radius:3px;display:inline-block;position:relative;\"><\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div class=\"noscroll\" style=\"{{ scrollStyle }}\">\n\n          <!-- =================== LOGIN =================== -->\n          <sc-if value=\"{{ isLogin }}\">\n            <div style=\"min-height:100%;display:flex;flex-direction:column;justify-content:center;padding:48px 30px;background:linear-gradient(180deg,#F6F0E8 0%,#F1E7D8 100%);\">\n              <div style=\"text-align:center;margin-bottom:34px;\">\n                <div class=\"ns\" style=\"font-size:52px;font-weight:600;letter-spacing:-.02em;color:#2A2520;\">Remy<\u002Fdiv>\n                <div style=\"font-size:14.5px;color:#6B6156;margin-top:6px;\">Meals in, groceries out.<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:12px;max-width:340px;width:100%;margin:0 auto;\">\n                <sc-if value=\"{{ loginErr }}\">\n                  <div style=\"background:#F6DFDB;border:1px solid #E9C4bd;border-radius:10px;padding:10px 13px;font-size:13px;color:#A8392B;display:flex;gap:8px;align-items:center;\"><b style=\"font-weight:700;\">!<\u002Fb> That username or password didn't match.<\u002Fdiv>\n                <\u002Fsc-if>\n                <input placeholder=\"Username\" style=\"border:1px solid #E1D8C9;background:#FFFDFA;border-radius:11px;padding:14px 15px;font:inherit;font-size:15px;outline:none;\">\n                <input placeholder=\"Password\" type=\"password\" value=\"wrong\" style=\"border:1px solid #E1D8C9;background:#FFFDFA;border-radius:11px;padding:14px 15px;font:inherit;font-size:15px;outline:none;\">\n                <button onclick=\"{{ login }}\" style=\"border:none;background:#C05B3B;color:#fff;font:inherit;font-size:15px;font-weight:600;padding:15px;border-radius:11px;cursor:pointer;margin-top:4px;box-shadow:0 2px 6px rgba(192,91,59,.25);\">Sign in<\u002Fbutton>\n                <button onclick=\"{{ failLogin }}\" style=\"border:none;background:transparent;color:#A79B8B;font:inherit;font-size:12px;cursor:pointer;margin-top:2px;\">Preview the error state<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- =================== PLAN STEP INDICATOR =================== -->\n          <sc-if value=\"{{ isPlan }}\">\n            <div style=\"padding:14px 20px 12px;\">\n              <div style=\"display:flex;align-items:center;gap:0;\">\n                <button onclick=\"{{ gotoStep }}\" data-n=\"0\" style=\"flex:1;border:none;background:transparent;cursor:pointer;font:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0;\">\n                  <span style=\"width:26px;height:26px;border-radius:50%;background:#C05B3B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;\">1<\u002Fspan>\n                  <span style=\"font-size:9.5px;font-weight:600;color:#2A2520;letter-spacing:.01em;\">Plan<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"height:2px;flex:0 0 auto;width:8px;background:#E1D8C9;\"><\u002Fdiv>\n                <button onclick=\"{{ gotoStep }}\" data-n=\"1\" style=\"flex:1;border:none;background:transparent;cursor:pointer;font:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0;\">\n                  <span style=\"width:26px;height:26px;border-radius:50%;background:#C05B3B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;\">2<\u002Fspan>\n                  <span style=\"font-size:9.5px;font-weight:600;color:#2A2520;\">Pick<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"height:2px;flex:0 0 auto;width:8px;background:#E1D8C9;\"><\u002Fdiv>\n                <button onclick=\"{{ gotoStep }}\" data-n=\"2\" style=\"flex:1;border:none;background:transparent;cursor:pointer;font:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0;\">\n                  <span style=\"width:26px;height:26px;border-radius:50%;background:#C05B3B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;\">3<\u002Fspan>\n                  <span style=\"font-size:9.5px;font-weight:600;color:#2A2520;\">List<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"height:2px;flex:0 0 auto;width:8px;background:#E1D8C9;\"><\u002Fdiv>\n                <button onclick=\"{{ gotoStep }}\" data-n=\"3\" style=\"flex:1;border:none;background:transparent;cursor:pointer;font:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0;\">\n                  <span style=\"width:26px;height:26px;border-radius:50%;background:#C05B3B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;\">4<\u002Fspan>\n                  <span style=\"font-size:9.5px;font-weight:600;color:#2A2520;\">Cart<\u002Fspan>\n                <\u002Fbutton>\n                <div style=\"height:2px;flex:0 0 auto;width:8px;background:#E1D8C9;\"><\u002Fdiv>\n                <button onclick=\"{{ gotoStep }}\" data-n=\"4\" style=\"flex:1;border:none;background:transparent;cursor:pointer;font:inherit;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0;\">\n                  <span style=\"width:26px;height:26px;border-radius:50%;background:#C05B3B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;\">5<\u002Fspan>\n                  <span style=\"font-size:9.5px;font-weight:600;color:#2A2520;\">Done<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- STEP 0: meal input / resume -->\n            <sc-if value=\"{{ step0 }}\">\n              <div style=\"padding:12px 22px 40px;\">\n                <sc-if value=\"{{ hasPlanInFlight }}\">\n                  <div class=\"ns\" style=\"font-size:30px;font-weight:600;line-height:1.12;letter-spacing:-.015em;margin:10px 0 4px;\">Welcome back.<\u002Fdiv>\n                  <div style=\"font-size:14.5px;color:#6B6156;margin-bottom:20px;\">You're mid-plan — pick up where you left off.<\u002Fdiv>\n                  <div style=\"background:#FFFDFA;border:1px solid #E7DFD3;border-radius:16px;padding:18px;box-shadow:0 1px 3px rgba(40,30,20,.05);\">\n                    <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#C05B3B;margin-bottom:10px;\">In progress<\u002Fdiv>\n                    <div style=\"display:flex;gap:16px;margin-bottom:16px;\">\n                      <div><div class=\"ns tab-fig\" style=\"font-size:26px;font-weight:600;\">3<\u002Fdiv><div style=\"font-size:12px;color:#6B6156;\">recipes picked<\u002Fdiv><\u002Fdiv>\n                      <div style=\"width:1px;background:#E7DFD3;\"><\u002Fdiv>\n                      <div><div class=\"ns\" style=\"font-size:26px;font-weight:600;\">List<\u002Fdiv><div style=\"font-size:12px;color:#6B6156;\">not yet reviewed<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                    <button onclick=\"{{ resume }}\" style=\"width:100%;border:none;background:#C05B3B;color:#fff;font:inherit;font-size:15px;font-weight:600;padding:14px;border-radius:11px;cursor:pointer;box-shadow:0 2px 6px rgba(192,91,59,.22);\">Continue plan<\u002Fbutton>\n                    <button onclick=\"{{ startOver }}\" style=\"width:100%;border:1px solid #E9C4bd;background:transparent;color:#A8392B;font:inherit;font-size:13.5px;font-weight:600;padding:11px;border-radius:11px;cursor:pointer;margin-top:8px;\">Start over<\u002Fbutton>\n                    <div style=\"font-size:11.5px;color:#A79B8B;text-align:center;margin-top:8px;\">Starting over discards this plan. Your saved recipes are kept.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <button onclick=\"{{ startNewPlan }}\" style=\"width:100%;border:none;background:transparent;color:#6B6156;font:inherit;font-size:13px;font-weight:600;padding:14px;cursor:pointer;margin-top:6px;\">Or start a fresh plan →<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noPlanInFlight }}\">\n                  <div class=\"ns\" style=\"font-size:31px;font-weight:600;line-height:1.12;letter-spacing:-.015em;margin:14px 0 6px;\">What are we cooking this week?<\u002Fdiv>\n                  <div style=\"font-size:14.5px;color:#6B6156;margin-bottom:16px;\">List meals in plain words, or paste a recipe link — we'll find options for each.<\u002Fdiv>\n                  <textarea placeholder=\"e.g. chicken tikka masala, some kind of salmon bowl, and street tacos on Friday\" style=\"width:100%;min-height:130px;border:1px solid #E1D8C9;background:#FFFDFA;border-radius:14px;padding:15px;font:inherit;font-size:15px;line-height:1.5;outline:none;resize:none;box-shadow:0 1px 3px rgba(40,30,20,.04);\"><\u002Ftextarea>\n                  <button onclick=\"{{ startNewPlan }}\" style=\"width:100%;border:none;background:#C05B3B;color:#fff;font:inherit;font-size:15.5px;font-weight:700;padding:15px;border-radius:12px;cursor:pointer;margin-top:12px;box-shadow:0 2px 8px rgba(192,91,59,.25);\">Find recipes →<\u002Fbutton>\n                  <div style=\"margin-top:22px;background:#FFFDFA;border:1px solid #E7DFD3;border-radius:14px;padding:16px;\">\n                    <div style=\"font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#B6AB99;margin-bottom:12px;\">How Remy works<\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n                      <div style=\"display:flex;gap:11px;\"><span class=\"ns\" style=\"flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:#F7E6DE;color:#A0492C;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;\">1<\u002Fspan><div style=\"font-size:13.5px;color:#3A342C;line-height:1.4;padding-top:3px;\">Pick a recipe for each meal from ~5 options.<\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;gap:11px;\"><span class=\"ns\" style=\"flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:#F7E6DE;color:#A0492C;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;\">2<\u002Fspan><div style=\"font-size:13.5px;color:#3A342C;line-height:1.4;padding-top:3px;\">We build one shopping list and match each item to a real Kroger product.<\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;gap:11px;\"><span class=\"ns\" style=\"flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:#F7E6DE;color:#A0492C;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;\">3<\u002Fspan><div style=\"font-size:13.5px;color:#3A342C;line-height:1.4;padding-top:3px;\">Review, then we fill your cart — you check out on kroger.com.<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- STEP 1: pick recipes -->\n            <sc-if value=\"{{ step1 }}\">\n              <div style=\"padding:6px 0 30px;\">\n                <div style=\"padding:6px 22px 6px;\">\n                  <div class=\"ns\" style=\"font-size:26px;font-weight:600;letter-spacing:-.01em;\">Pick your recipes<\u002Fdiv>\n                  <div style=\"font-size:14px;color:#6B6156;margin-top:3px;\">One per meal — or skip. We saved the ones you pick to your cookbook.<\u002Fdiv>\n                  <div style=\"display:flex;gap:5px;margin-top:12px;font-family:ui-monospace,monospace;font-size:10.5px;\">\n                    <span style=\"color:#A79B8B;align-self:center;\">demo tacos state:<\u002Fspan>\n                    <button onclick=\"{{ setMealState }}\" data-m=\"ready\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:3px 8px;cursor:pointer;font:inherit;color:#6B6156;\">ready<\u002Fbutton>\n                    <button onclick=\"{{ setMealState }}\" data-m=\"loading\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:3px 8px;cursor:pointer;font:inherit;color:#6B6156;\">loading<\u002Fbutton>\n                    <button onclick=\"{{ setMealState }}\" data-m=\"degraded\" style=\"border:1px solid #E1D8C9;background:#F6F0E8;border-radius:6px;padding:3px 8px;cursor:pointer;font:inherit;color:#6B6156;\">degraded<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <sc-for list=\"{{ mealsView }}\" as=\"meal\" hint-placeholder-count=\"3\">\n                  <div style=\"margin-top:18px;\">\n                    <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding:0 22px 10px;\">\n                      <div class=\"ns\" style=\"font-size:19px;font-weight:600;letter-spacing:-.01em;\">{{ meal.name }}<\u002Fdiv>\n                      <a href=\"#\" style=\"font-size:12.5px;font-weight:600;color:#6B6156;\">Skip<\u002Fa>\n                    <\u002Fdiv>\n\n                    <sc-if value=\"{{ meal.degraded }}\">\n                      <div style=\"margin:0 22px 10px;background:#F7ECD6;border:1px solid #E7D3A8;border-radius:10px;padding:9px 12px;font-size:12.5px;color:#916312;display:flex;gap:8px;align-items:center;justify-content:space-between;\">\n                        <span>Web search failed — showing your saved recipes only.<\u002Fspan>\n                        <button style=\"border:none;background:#916312;color:#fff;font:inherit;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;\">Retry<\u002Fbutton>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n\n                    <sc-if value=\"{{ meal.loading }}\">\n                      <div style=\"display:flex;gap:12px;overflow:hidden;padding:2px 22px 14px;\">\n                        <div style=\"width:210px;flex:0 0 auto;\"><div class=\"sk\" style=\"height:150px;border-radius:14px;\"><\u002Fdiv><div class=\"sk\" style=\"height:13px;border-radius:5px;margin-top:10px;width:90%;\"><\u002Fdiv><div class=\"sk\" style=\"height:13px;border-radius:5px;margin-top:6px;width:55%;\"><\u002Fdiv><\u002Fdiv>\n                        <div style=\"width:210px;flex:0 0 auto;\"><div class=\"sk\" style=\"height:150px;border-radius:14px;\"><\u002Fdiv><div class=\"sk\" style=\"height:13px;border-radius:5px;margin-top:10px;width:80%;\"><\u002Fdiv><div class=\"sk\" style=\"height:13px;border-radius:5px;margin-top:6px;width:50%;\"><\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"padding:0 22px;font-size:12px;color:#A79B8B;display:flex;align-items:center;gap:8px;\"><span style=\"width:13px;height:13px;border:2px solid #E1D8C9;border-top-color:#C05B3B;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;\"><\u002Fspan>Searching the web for “{{ meal.name }}”…<\u002Fdiv>\n                    <\u002Fsc-if>\n\n                    <sc-if value=\"{{ meal.notLoading }}\">\n                    <div style=\"{{ candRowStyle }}\" class=\"noscroll\">\n                      <sc-for list=\"{{ meal.cands }}\" as=\"c\" hint-placeholder-count=\"5\">\n                        <button onclick=\"{{ select }}\" data-meal=\"{{ meal.id }}\" data-cand=\"{{ c.id }}\" style=\"{{ cardW }}\">\n                          <div style=\"width:100%;\">\n                            <div style=\"position:relative;height:150px;border-radius:14px;overflow:hidden;background:#EEE4D3;background-image:repeating-linear-gradient(135deg,#E9DECB 0 11px,#EDE3D2 11px 22px);border:1px solid #E1D8C9;display:flex;align-items:flex-end;padding:9px;\">\n                              <sc-if value=\"{{ c.selected }}\">\n                                <span style=\"position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:#C05B3B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.2);\">✓<\u002Fspan>\n                              <\u002Fsc-if>\n                              <span style=\"font-family:ui-monospace,monospace;font-size:10px;color:#A0937E;background:rgba(255,253,250,.7);padding:2px 6px;border-radius:5px;\">recipe photo<\u002Fspan>\n                            <\u002Fdiv>\n                            <div style=\"display:flex;gap:6px;margin-top:9px;\">\n                              <span style=\"{{ c.oStyle }}\">{{ c.oText }}<\u002Fspan>\n                              <span style=\"font-size:11px;color:#A79B8B;align-self:center;\">{{ c.time }}<\u002Fspan>\n                            <\u002Fdiv>\n                            <div class=\"ns\" style=\"font-size:15px;font-weight:600;line-height:1.2;margin-top:6px;color:#2A2520;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;\">{{ c.title }}<\u002Fdiv>\n                            <div
